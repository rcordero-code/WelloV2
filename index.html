<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wello — Riviera Ridge School</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #1a7a8a;
    --teal-light: #2aa6bc;
    --gold: #f5a623;
    --cream: #fdf8f0;
    --dark: #1a2535;
    --soft: #e8f6f9;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  .bg-blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    pointer-events: none;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .blob1 { width: 500px; height: 500px; background: var(--teal); top: -150px; left: -100px; }
  .blob2 { width: 400px; height: 400px; background: var(--gold); bottom: -100px; right: -80px; animation-delay: -4s; }
  .blob3 { width: 300px; height: 300px; background: var(--teal-light); bottom: 200px; left: -50px; animation-delay: -8s; }

  @keyframes drift {
    0% { transform: translate(0,0) scale(1); }
    100% { transform: translate(30px,20px) scale(1.05); }
  }

  .header {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(12px);
    border-bottom: 2px solid rgba(26,122,138,0.12);
    position: relative;
    z-index: 10;
  }
  .school-name {
    font-family: 'Fredoka One', cursive;
    color: var(--teal);
    font-size: 1.1rem;
  }
  .header-badge {
    background: var(--teal);
    color: white;
    font-size: 0.7rem;
    font-weight: 800;
    padding: 4px 12px;
    border-radius: 99px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 760px;
    padding: 20px 24px;
    gap: 18px;
    position: relative;
    z-index: 5;
  }

  .avatar-zone { display: flex; flex-direction: column; align-items: center; gap: 10px; }

  .avatar-wrapper {
    position: relative;
    width: 160px;
    height: 160px;
  }

  .pulse-ring {
    position: absolute;
    border-radius: 50%;
    border: 3px solid var(--teal-light);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0;
    pointer-events: none;
  }
  .pulse-ring.r1 { width: 160px; height: 160px; }
  .pulse-ring.r2 { width: 190px; height: 190px; }
  .pulse-ring.r3 { width: 220px; height: 220px; }

  .avatar-wrapper.speaking .pulse-ring.r1 { animation: pulse 1.5s ease-out infinite; }
  .avatar-wrapper.speaking .pulse-ring.r2 { animation: pulse 1.5s ease-out infinite 0.3s; }
  .avatar-wrapper.speaking .pulse-ring.r3 { animation: pulse 1.5s ease-out infinite 0.6s; }

  @keyframes pulse {
    0% { opacity: 0.7; transform: translate(-50%,-50%) scale(0.95); }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(1.3); }
  }

  .avatar-face {
    width: 150px; height: 150px;
    position: relative; z-index: 2;
    filter: drop-shadow(0 8px 20px rgba(26,122,138,0.3));
    transition: transform 0.3s;
  }
  .avatar-face:hover { transform: scale(1.04); }

  .eye-lid { animation: blink 5s ease-in-out infinite; }
  @keyframes blink {
    0%,92%,100% { transform: scaleY(1); }
    94%,98% { transform: scaleY(0.05); }
  }

  .voice-bars {
    display: flex;
    align-items: center;
    gap: 4px;
    height: 32px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .voice-bars.active { opacity: 1; }
  .bar {
    width: 5px;
    border-radius: 99px;
    background: var(--teal-light);
    animation: barBounce 0.8s ease-in-out infinite;
    height: 6px;
  }
  .bar:nth-child(1) { animation-delay: 0s; }
  .bar:nth-child(2) { animation-delay: 0.1s; }
  .bar:nth-child(3) { animation-delay: 0.2s; }
  .bar:nth-child(4) { animation-delay: 0.15s; }
  .bar:nth-child(5) { animation-delay: 0.05s; }
  .bar:nth-child(6) { animation-delay: 0.25s; }
  .bar:nth-child(7) { animation-delay: 0.1s; }

  @keyframes barBounce {
    0%,100% { height: 6px; background: var(--teal-light); }
    50% { height: 28px; background: var(--teal); }
  }

  .avatar-name {
    font-family: 'Fredoka One', cursive;
    font-size: 2.2rem;
    color: var(--teal);
    line-height: 1;
  }
  .avatar-tagline { font-size: 0.85rem; color: #666; font-weight: 600; }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    background: white;
    border: 2px solid rgba(26,122,138,0.15);
    border-radius: 99px;
    padding: 5px 14px;
    font-size: 0.78rem;
    font-weight: 800;
    color: #666;
    transition: all 0.3s;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #ccc;
    transition: background 0.3s;
  }
  .status-pill.ready .status-dot { background: #4caf50; }
  .status-pill.thinking .status-dot { background: var(--gold); animation: statusPulse 1s infinite; }
  .status-pill.speaking .status-dot { background: var(--teal-light); animation: statusPulse 0.6s infinite; }
  @keyframes statusPulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.4); }
  }

  .chat-bubble {
    background: white;
    border-radius: 20px;
    border: 2.5px solid rgba(26,122,138,0.15);
    padding: 18px 22px;
    width: 100%;
    min-height: 80px;
    max-height: 200px;
    overflow-y: auto;
    box-shadow: 0 4px 24px rgba(26,122,138,0.08);
    position: relative;
    font-size: 1rem;
    color: var(--dark);
    line-height: 1.65;
    font-weight: 600;
    transition: all 0.3s;
  }
  .chat-bubble::before {
    content: '';
    position: absolute;
    top: -10px; left: 50%;
    transform: translateX(-50%);
    width: 20px; height: 10px;
    background: white;
    clip-path: polygon(50% 0%,0% 100%,100% 100%);
  }
  .dot-loader { display: flex; align-items: center; gap: 6px; }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--teal-light);
    animation: dotBounce 1s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes dotBounce {
    0%,100% { transform: translateY(0); opacity: 0.5; }
    50% { transform: translateY(-6px); opacity: 1; }
  }

  .input-zone {
    width: 100%;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .input-box {
    flex: 1;
    background: white;
    border: 2.5px solid rgba(26,122,138,0.2);
    border-radius: 16px;
    padding: 14px 18px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--dark);
    outline: none;
    box-shadow: 0 2px 12px rgba(26,122,138,0.06);
    transition: border-color 0.2s;
  }
  .input-box::placeholder { color: #aab8c2; font-weight: 600; }
  .input-box:focus { border-color: var(--teal-light); }

  .icon-btn {
    width: 52px; height: 52px;
    border-radius: 14px;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, background 0.2s;
    flex-shrink: 0;
  }
  .icon-btn:active { transform: scale(0.96); }

  .send-btn {
    background: var(--teal);
    box-shadow: 0 4px 14px rgba(26,122,138,0.35);
  }
  .send-btn:hover { background: var(--teal-light); transform: scale(1.05); }
  .send-btn svg { fill: white; }

  .mic-btn {
    background: var(--cream);
    border: 2.5px solid rgba(26,122,138,0.2) !important;
  }
  .mic-btn:hover { background: var(--soft); }
  .mic-btn.recording { background: #ffe8e8; animation: micGlow 1s ease-in-out infinite; }
  .mic-btn svg { stroke: var(--teal); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
  .mic-btn.recording svg { stroke: #e05555; }
  @keyframes micGlow {
    0%,100% { box-shadow: 0 0 0 0 rgba(224,85,85,0.3); }
    50% { box-shadow: 0 0 0 8px rgba(224,85,85,0); }
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    width: 100%;
  }
  .chip {
    background: white;
    border: 2px solid rgba(26,122,138,0.18);
    color: var(--teal);
    font-family: 'Nunito', sans-serif;
    font-size: 0.8rem;
    font-weight: 800;
    padding: 7px 14px;
    border-radius: 99px;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 2px 8px rgba(26,122,138,0.06);
  }
  .chip:hover { background: var(--teal); color: white; transform: translateY(-2px); }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #333;
    color: white;
    padding: 10px 20px;
    border-radius: 99px;
    font-size: 0.85rem;
    font-weight: 700;
    transition: transform 0.4s ease;
    z-index: 100;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>

<header class="header">
  <div class="school-name">🏫 The Riviera Ridge School</div>
  <div class="header-badge">✨ Meet Wello</div>
</header>

<main class="main">

  <div class="avatar-zone">
    <div class="avatar-wrapper" id="avatarWrapper">
      <div class="pulse-ring r1"></div>
      <div class="pulse-ring r2"></div>
      <div class="pulse-ring r3"></div>

      <svg class="avatar-face" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

      onkeydown="if(event.key==='Enter') sendMessage()"/>

</main>

<script>
const OPENAI_KEY   = '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';
const ELEVENLABS_KEY  = 'sk_5d6ef9c501d464661d6faf1b6b0ff641a1a555510a5815fa';
const ELEVENLABS_VOICE_ID = 'EXAVITQu4vr4xnSDxMaL'; // Sarah — warm & clear

const SCHOOL_CONTEXT = `You are Wello, a friendly and enthusiastic AI assistant for The Riviera Ridge School in Santa Barbara, California.

ABOUT THE SCHOOL:
- Private day school for grades Pre-K (Junior Kindergarten) through 8th grade
- Located in Santa Barbara, California
- Founded over 80 years ago
- Head of School: Christina Broderick
- Mission: A vigorous and personalized educational experience for every scholar, every day
- Core values: Joy, Kindness, Diversity, Ethical Responsibility

CAMPUS:
- Pollock Hall: Middle School Division
- Gerard Hall: Lower School Division
- Marian Hall: Early Childhood Education
- Historic Tea House and Pool, Marymount Heritage and Meditation Garden, Athletics and Outdoor Learning Spaces

ACADEMICS:
- Junior Kindergarten (JK), Lower School (Grades 1-5), Middle School (Grades 6-8) with Honors track
- STEAM2 Electives in Middle School
- Progressive educational model focused on developing each child's talents

SIGNATURE PROGRAMS:
- Kaleidoscope: Explores world religions and diverse cultures including Buddhism, Catholicism, Christianity, Hinduism, Islam, Jainism, Judaism, Native American Traditions, Shinto, Sikhism, and Taoism
- SEEK! (Study, Experience, Explore, Know)
- ExSEL & Learning Support
- Summer on the Ridge

ARTS & ATHLETICS:
- Visual & Performing Arts, Athletics, Auxiliary Programs

ADMISSIONS:
- Book a tour: www.rivieraridge.org/admissions/join-us
- Tuition & Financial Assistance available
- Contact: www.rivieraridge.org/contact

YOUR PERSONALITY:
- Warm, friendly, and enthusiastic — speak naturally as if talking to a student or parent
- Keep answers concise, 2 to 4 sentences. Use natural spoken language with no bullet points or markdown.
- If unsure about specific details, direct them to www.rivieraridge.org or suggest they call the school
- Never make up specific prices, dates, or staff names beyond what you know`;

let mouthInterval = null;
let recognition    = null;
let isRecording    = false;
let currentAudio   = null;

// ── UI helpers ──────────────────────────────────────────────────────────
function setStatus(state, text) {
  const pill  = document.getElementById('statusPill');
  const label = document.getElementById('statusText');
  pill.className = `status-pill ${state}`;
  label.textContent = text;
}

function showToast(msg, duration = 4000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function startSpeaking() {
  document.getElementById('avatarWrapper').classList.add('speaking');
  document.getElementById('voiceBars').classList.add('active');
  animateMouth(true);
  setStatus('speaking', 'Speaking…');
}

function stopSpeaking() {
  document.getElementById('avatarWrapper').classList.remove('speaking');
  document.getElementById('voiceBars').classList.remove('active');
  animateMouth(false);
  setStatus('ready', 'Ready to help');
}

function animateMouth(talking) {
  const mouth = document.getElementById('wello-mouth');
  if (mouthInterval) clearInterval(mouthInterval);
  if (!talking) { mouth.setAttribute('d','M82 130 Q100 145 118 130'); return; }
  const shapes = [
    'M82 130 Q100 149 118 130',
    'M85 134 Q100 141 115 134',
    'M82 128 Q100 152 118 128',
    'M84 132 Q100 144 116 132',
    'M83 131 Q100 147 117 131',
  ];
  let i = 0;
  mouthInterval = setInterval(() => {
    mouth.setAttribute('d', shapes[i++ % shapes.length]);
  }, 160);
}

// ── ElevenLabs TTS ──────────────────────────────────────────────────────
async function speakWithElevenLabs(text) {
  const clean = text.replace(/[\u{1F000}-\u{1FFFF}]/gu, '').trim();
  try {
    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${ELEVENLABS_VOICE_ID}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'xi-api-key': ELEVENLABS_KEY
      },
      body: JSON.stringify({
        text: clean,
        model_id: 'eleven_turbo_v2',
        voice_settings: { stability: 0.5, similarity_boost: 0.85, style: 0.3, use_speaker_boost: true }
      })
    });

    if (!res.ok) throw new Error(`ElevenLabs ${res.status}`);

    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);

    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    currentAudio = new Audio(url);
    currentAudio.onplay  = () => startSpeaking();
    currentAudio.onended = () => { stopSpeaking(); URL.revokeObjectURL(url); };
    currentAudio.onerror = () => { stopSpeaking(); fallbackSpeak(clean); };
    await currentAudio.play();

  } catch (err) {
    console.warn('ElevenLabs error:', err);
    fallbackSpeak(clean);
  }
}

function fallbackSpeak(text) {
  if (!('speechSynthesis' in window)) { stopSpeaking(); return; }
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 1.0; utt.pitch = 1.1;
  utt.onstart = startSpeaking;
  utt.onend   = stopSpeaking;
  window.speechSynthesis.speak(utt);
}

// ── OpenAI chat ─────────────────────────────────────────────────────────
async function sendMessage(text) {
  const input    = document.getElementById('userInput');
  const question = text || input.value.trim();
  if (!question) return;

  input.value = '';
  document.getElementById('chipsContainer').style.display = 'none';

  const bubble = document.getElementById('chatBubble');
  bubble.innerHTML = '<div class="dot-loader"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
  setStatus('thinking', 'Thinking…');

  try {
    const res = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${OPENAI_KEY}`
      },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        max_tokens: 300,
        messages: [
          { role: 'system', content: SCHOOL_CONTEXT },
          { role: 'user',   content: question }
        ]
      })
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      const errMsg  = errData.error?.message || '';
      const status  = res.status;
      console.error('OpenAI error response:', status, errData);
      showToast(`⚠️ ${status}: ${errMsg.slice(0,80)}`, 7000);
      throw new Error(`${status}: ${errMsg}`);
    }

    const data   = await res.json();
    const answer = data.choices?.[0]?.message?.content || "I'm not sure — please visit www.rivieraridge.org for more info!";

    bubble.textContent = answer;
    await speakWithElevenLabs(answer);

  } catch (err) {
    console.error('sendMessage error:', err);
    bubble.textContent = "Oops! Something went wrong. Please check your connection and try again.";
    stopSpeaking();
  }
}

function askChip(q) {
  document.getElementById('userInput').value = q;
  sendMessage(q);
}

// ── Voice input ─────────────────────────────────────────────────────────
function toggleMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Voice input needs Chrome browser'); return; }

  const btn = document.getElementById('micBtn');

  if (isRecording) {
    recognition?.stop();
    isRecording = false;
    btn.classList.remove('recording');
    setStatus('ready', 'Ready to help');
    return;
  }

  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  const input = document.getElementById('userInput');

  // Show interim results live in the input box as you speak
  recognition.onresult = e => {
    let interim = '';
    let final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t;
      else interim += t;
    }
    input.value = final || interim;

    // Auto-send when we get a final result
    if (final.trim()) {
      isRecording = false;
      btn.classList.remove('recording');
      sendMessage(final.trim());
    }
  };

  recognition.onspeechstart = () => {
    setStatus('thinking', 'Hearing you…');
  };

  recognition.onnomatch = () => {
    showToast("Didn't catch that — please try again");
    setStatus('ready', 'Ready to help');
  };

  recognition.onend = () => {
    isRecording = false;
    btn.classList.remove('recording');
    // If input has text but no final result triggered sendMessage, send it now
    const val = input.value.trim();
    if (val && document.getElementById('chatBubble').querySelector('.dot-loader') === null) {
      sendMessage(val);
    } else if (!val) {
      setStatus('ready', 'Ready to help');
      showToast('No speech detected — tap mic and speak clearly');
    }
  };

  recognition.onerror = e => {
    isRecording = false;
    btn.classList.remove('recording');
    setStatus('ready', 'Ready to help');
    if (e.error === 'no-speech') showToast('No speech heard — try again');
    else if (e.error === 'not-allowed') showToast('Mic blocked — check Chrome permissions');
    else showToast('Mic error: ' + e.error);
  };

  try {
    recognition.start();
    isRecording = true;
    btn.classList.add('recording');
    setStatus('thinking', '🎤 Listening — speak now…');
    showToast('🎤 Listening… speak now!', 2000);
  } catch(e) {
    showToast('Could not start mic — try again');
  }
}
</script>
</body>
</html>
